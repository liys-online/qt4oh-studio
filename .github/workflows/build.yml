name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - os: macos-14
            platform: mac
            node_platform: darwin
            node_arch: arm64
            node_ext: tar.gz
            node_bin: build/node-arm64

          # Windows x64
          - os: windows-latest
            platform: win
            node_platform: win
            node_arch: x64
            node_ext: zip
            node_bin: build/node.exe

          # Linux x64
          - os: ubuntu-22.04
            platform: linux
            node_platform: linux
            node_arch: x64
            node_ext: tar.gz
            node_bin: build/node-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 为 Electron 重新编译 native 模块（better-sqlite3 等）──────────────
      - name: Rebuild native modules for Electron (macOS / Linux)
        if: runner.os != 'Windows'
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Rebuild native modules for Electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npx @electron/rebuild -f -w better-sqlite3

      # ── 下载并放置随包附带的 Node.js 可执行文件 ────────────────────────────
      - name: Prepare bundled Node.js (macOS arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          NODE_VER=$(node -e "process.stdout.write(process.version.slice(1))")
          echo "Bundling Node.js v${NODE_VER} for darwin-arm64"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-darwin-arm64.tar.gz" \
            | tar xz -C /tmp
          mkdir -p build
          cp "/tmp/node-v${NODE_VER}-darwin-arm64/bin/node" build/node-arm64
          chmod +x build/node-arm64

      - name: Prepare bundled Node.js (Windows x64)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeVer = node -e "process.stdout.write(process.version.slice(1))"
          Write-Host "Bundling Node.js v${nodeVer} for win-x64"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v${nodeVer}/node-v${nodeVer}-win-x64.zip" `
            -OutFile "$env:TEMP\node.zip"
          Expand-Archive "$env:TEMP\node.zip" -DestinationPath "$env:TEMP\node-tmp"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Copy-Item "$env:TEMP\node-tmp\node-v${nodeVer}-win-x64\node.exe" -Destination build\node.exe

      - name: Prepare bundled Node.js (Linux x64)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          NODE_VER=$(node -e "process.stdout.write(process.version.slice(1))")
          echo "Bundling Node.js v${NODE_VER} for linux-x64"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-linux-x64.tar.gz" \
            | tar xz -C /tmp
          mkdir -p build
          cp "/tmp/node-v${NODE_VER}-linux-x64/bin/node" build/node-x64
          chmod +x build/node-x64

      # ── 构建 Next.js + 编译 Electron 主进程 ────────────────────────────────
      - name: Build Next.js
        run: npx next build

      - name: Compile Electron main process
        run: npx tsc --project tsconfig.electron.json

      # ── electron-builder 打包 ──────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 取消注释以启用代码签名：
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          npx electron-builder --mac \
            --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 取消注释以启用代码签名：
          # CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $publish = if ("${{ github.ref }}".StartsWith("refs/tags/")) { "always" } else { "never" }
          npx electron-builder --win --publish $publish

      - name: Package (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux \
            --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      # ── 上传构建产物（非 tag 触发时作为 artifact 保存）─────────────────────
      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: qt4oh-studio-${{ matrix.platform }}-${{ matrix.node_arch }}
          path: |
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.dmg
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 7
