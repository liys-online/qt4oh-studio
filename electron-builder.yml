appId: com.qt4oh.studio
productName: qt4oh-studio
copyright: Copyright © 2026

# 打包时包含的文件
files:
  - electron-dist/**/*
  - .next/build/**/*
  - .next/cache/**/*
  - .next/node_modules/**/*
  - .next/server/**/*
  - .next/static/**/*
  - .next/types/**/*
  - .next/*.json
  - .next/*.js
  - .next/BUILD_ID
  - "public/**/*"
  - "!public/hdc/**"
  - package.json
  - next.config.ts

# 运行时数据目录不打包
directories:
  output: release

# macOS 配置（使用 zip 格式，避免下载 dmg-builder）
mac:
  extraResources:
    - from: build/node-${arch}
      to: node
    - from: public/hdc/darwin-${arch}/hdc
      to: hdc
    - from: public/hdc/darwin-${arch}/libusb_shared.dylib
      to: libusb_shared.dylib
  target:
    - target: zip
      arch:
        - arm64
  category: public.app-category.developer-tools

# Windows 配置
win:
  extraResources:
    - from: build/node.exe
      to: node.exe
    - from: public/hdc/win-x64/hdc.exe
      to: hdc.exe
    - from: public/hdc/win-x64/libusb_shared.dll
      to: libusb_shared.dll
  target:
    - target: nsis
      arch:
        - x64
  signtoolOptions:
    sign: null

# Linux 配置
linux:
  extraResources:
    - from: build/node-x64
      to: node
    - from: public/hdc/linux-x64/hdc
      to: hdc
    - from: public/hdc/linux-x64/libusb_shared.so
      to: libusb_shared.so
  target:
    - target: AppImage
      arch:
        - x64
  category: Development

# 安装包配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - zh_CN
  language: 2052
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: qt4oh-studio

# 禁用自动 rebuild native 模块（手动用系统 node 编译，确保 NMV 一致）
npmRebuild: false

# asar 打包（加速启动）
asar: true
asarUnpack:
  - node_modules/**/*
  - .next/**/*
  - public/**/*
